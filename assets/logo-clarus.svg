<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 186 46" fill="none" role="img" aria-label="Clarus — Minsoo Cho">
  <!--
    C arc: center (22, 23), radius 16
    opens at ±35deg from right
    top  = (22 + 16·cos-35, 23 + 16·sin-35) ≈ (35.1, 13.8) → (35, 14)
    btm  = (35, 32)
  -->
  <path d="M 35 14 A 16 16 0 1 0 35 32"
        stroke="#0f766e" stroke-width="4.6" stroke-linecap="round"/>

  <!-- CLARUS wordmark -->
  <text x="48" y="28"
        font-family="Inter, system-ui, sans-serif"
        font-size="18" font-weight="800"
        fill="#111417" letter-spacing="-0.02em">CLARUS</text>

  <!-- rule -->
  <line x1="48" y1="33" x2="184" y2="33" stroke="#ddd8cf" stroke-width="0.65"/>

  <!-- subtitle -->
  <text x="48" y="43"
        font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="600"
        fill="#69737c" letter-spacing="0.04em">Minsoo Cho</text>
</svg>
