<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Clarus">
  <!--
    C arc: center (15, 16), radius 12
    opens at ±30deg from right
    top = (15 + 12·cos-30, 16 + 12·sin-30) ≈ (25.4, 10) → (25, 10)
    btm = (25, 22)
  -->
  <path d="M 25 10 A 12 12 0 1 0 25 22"
        stroke="#0f766e" stroke-width="3.4" stroke-linecap="round"/>
</svg>
